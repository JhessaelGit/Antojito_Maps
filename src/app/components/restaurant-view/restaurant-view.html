<div class="container" *ngIf="restaurante">
  <header class="res-header">
    <app-button variant="outline" label="← Volver al Mapa" (clicked)="volverAlMapa()"></app-button>
    <h1>{{ restaurante.nombre }}</h1>
    <p class="category-badge">{{ restaurante.categoria }}</p>
  </header>

  <section class="promo-section">
    <h2>Promociones Disponibles</h2>
    <div class="grid">
      <app-card 
        *ngFor="let promo of promociones"
        variant="promotion"
        [title]="promo.nombre"
        [subtitle]="promo.desc"
        [badgeText]="'$' + promo.precio"
        [showActions]="false"> 
      </app-card>
    </div>
  </section>
</div>
