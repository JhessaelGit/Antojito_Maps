<div class="container">

  <div class="header">
    <h2>ANTOJITOS MAPS</h2>
    <button class="btn-admin" (click)="irAdmin()">Administrar</button>
  </div>

  <div class="grid">

    <div class="card" *ngFor="let r of restaurantes">

      <span class="lock">{{ r.bloqueado ? '🔒' : '🔓' }}</span>

      <h3>{{ r.nombre }}</h3>

      <p>Suscripción: {{ r.plan }}</p>
      <p>Tiempo restante: {{ r.tiempo }}</p>

      <button (click)="toggleBloqueo(r)">
        {{ r.bloqueado ? 'Desbloquear' : 'Bloquear' }}
      </button>

    </div>

  </div>

</div>
