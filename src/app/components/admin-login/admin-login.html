<div class="login-wrapper">
  
  <div class="app-header">
    <h1>Antojitos Maps</h1>
  </div>

  <div class="login-container">
    <form class="login-form" #form="ngForm">

      <h2>Administrador</h2>

      <!-- Correo -->
      <div class="form-group">
        <label for="correo">Correo</label>
        <div class="input-with-icon">
          <i class="fas fa-user input-icon"></i>

          <input 
            type="email"
            id="correo"
            name="correo"
            [(ngModel)]="correo"
            placeholder="Ingresa tu correo"
            required
          />
        </div>

        <div *ngIf="form.submitted && !correo" class="error">
          El correo no puede estar vacío
        </div>

        <div *ngIf="correo && !correo.includes('@')" class="error">
          El correo debe contener "@"
        </div>
      </div>

      <!-- Contraseña -->
      <div class="form-group">
        <label for="password">Contraseña</label>

        <div class="input-with-icon">
          <i class="fas fa-lock input-icon"></i>

          <input 
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            name="password"
            [(ngModel)]="password"
            placeholder="Ingresa tu contraseña"
            required
          />

          <i 
            class="fas toggle-password-icon"
            [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"
            (click)="togglePasswordVisibility()">
          </i>
        </div>

        <div *ngIf="form.submitted && !password" class="error">
          La contraseña no puede estar vacía
        </div>
      </div>

      <div class="button-group">
        <button type="button" class="btn btn-primary" (click)="login(form)">
          Iniciar Sesión
        </button>
      </div>

    </form>
  </div>
</div>
