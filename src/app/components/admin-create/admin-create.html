<div class="form-page">

  <div class="form-card">

    <h2 class="title">Agregar Administrador</h2>

    <!-- CORREO -->
    <div class="field-group">
      <input 
        [(ngModel)]="correo" 
        placeholder="Correo"
        type="email"
      >
      <div class="error" *ngIf="errorCorreo">{{ errorCorreo }}</div>
    </div>

    <!-- CONTRASEÑA -->
    <div class="field-group">
      <input 
        [(ngModel)]="password" 
        placeholder="Contraseña"
        [type]="showPassword ? 'text' : 'password'"
      >
      <div class="error" *ngIf="errorPassword">{{ errorPassword }}</div>
    </div>

    <!-- BOTÓN -->
    <button class="btn-primary" (click)="agregar()">
      Agregar
    </button>

  </div>

</div>
