<div class="dashboard-container">
  <header class="app-header">
    <div class="logo-section">
      <span class="logo-icon">📍</span>
      <h1>Antojitos <span class="highlight">Maps</span></h1>
    </div>

    <div class="search-box">
      <input 
        type="text" 
        #txtBuscar 
        placeholder="Buscar restaurante..." 
        (keyup.enter)="buscarRestaurante(txtBuscar.value)">
      <button (click)="buscarRestaurante(txtBuscar.value)">
        <span>🔍</span>
      </button>
    </div>
  </header>

  <main class="map-wrapper">

    
    <div style="position:absolute; z-index:1000; top:70px; left:10px; background:white; padding:8px; border-radius:8px;">
      <select [(ngModel)]="categoriaSeleccionada" (change)="filtrarRestaurantes()">
        <option value="">Todas</option>
        <option value="pollo frito">Pollo frito</option>
        <option value="comida rapida">Comida rápida</option>
        <option value="italiana">Italiana</option>
      </select>
    </div>

   
    <div id="map"></div>
    

    @if (mostrarBienvenida) {
      <div class="map-overlay-info">
        <h3>¡Bienvenido!</h3>
        <p>Explora los mejores sabores de la ciudad en un solo mapa.</p>
        <hr class="divider">
        <p class="instruction">Haz clic en los restaurantes para ver sus promociones disponibles.</p>
      </div>
    }

  </main>
</div>
